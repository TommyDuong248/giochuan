<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f6cbd">
<title>Giờ Chuẩn — Tính giờ chuẩn giảng dạy</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Giờ Chuẩn">
<style>
:root{
  --primary:#0f6cbd; --primary-dark:#0a4f8f; --bg:#f4f6f9; --card:#ffffff;
  --text:#1a2433; --muted:#64748b; --border:#e2e8f0; --green:#15803d;
  --red:#b91c1c; --amber:#b45309; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.45;padding-bottom:calc(64px + env(safe-area-inset-bottom))}
header{background:var(--primary);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px}
header h1{font-size:17px;font-weight:600;flex:1}
header select{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:5px 8px;font-size:13px}
header select option{color:#1a2433}
main{max-width:860px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card h2{font-size:15px;margin-bottom:10px;color:var(--primary-dark)}
.card h3{font-size:14px;margin:10px 0 6px}
.muted{color:var(--muted);font-size:13px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:14px;font-weight:500;cursor:pointer}
.btn:active{background:var(--primary-dark)}
.btn.secondary{background:#eef2f7;color:var(--text);border:1px solid var(--border)}
.btn.danger{background:#fee2e2;color:var(--red);border:1px solid #fecaca}
.btn.small{padding:5px 10px;font-size:13px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.right{margin-left:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.02em}
td.num,th.num{text-align:right;white-space:nowrap}
.tablewrap{overflow-x:auto}
.empty{padding:24px;text-align:center;color:var(--muted)}
label{display:block;font-size:13px;font-weight:600;margin:10px 0 4px;color:#334155}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:#fff;color:var(--text)}
input:focus,select:focus{outline:2px solid var(--primary);outline-offset:0;border-color:var(--primary)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px}
@media(max-width:520px){.grid3{grid-template-columns:1fr 1fr}}
.check{display:flex;align-items:center;gap:8px;font-weight:400;margin:8px 0}
.check input{width:auto}
dialog{border:none;border-radius:14px;padding:0;width:min(560px,calc(100vw - 24px));max-height:88vh}
dialog::backdrop{background:rgba(15,23,42,.5)}
.dlg-head{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:2}
.dlg-head b{font-size:16px}
.dlg-body{padding:4px 16px 16px;overflow-y:auto}
.dlg-foot{display:flex;gap:8px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--border);position:sticky;bottom:0;background:#fff}
nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;padding:8px 2px 6px;font-size:11px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
nav button.active{color:var(--primary);font-weight:600}
nav button svg{width:22px;height:22px}
.stat{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--border);font-size:14px}
.stat:last-child{border-bottom:none}
.stat b.ok{color:var(--green)} .stat b.bad{color:var(--red)}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11.5px;font-weight:600}
.badge.green{background:#dcfce7;color:var(--green)}
.badge.red{background:#fee2e2;color:var(--red)}
.badge.blue{background:#dbeafe;color:var(--primary-dark)}
.badge.amber{background:#fef3c7;color:var(--amber)}
.note{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:8px;padding:9px 12px;font-size:13px;margin:8px 0}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0}
.kpi{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px}
.kpi .v{font-size:20px;font-weight:700} .kpi .l{font-size:12px;color:var(--muted)}
.kpi.green .v{color:var(--green)} .kpi.red .v{color:var(--red)} .kpi.blue .v{color:var(--primary-dark)}
.preview{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;margin-top:12px;font-size:14px}
.preview b{color:var(--primary-dark)}
.actions{white-space:nowrap}
.actions button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px}
@media print{
  header,nav,.no-print{display:none!important}
  body{background:#fff;padding:0}
  .card{border:none;page-break-inside:avoid}
  main{max-width:100%}
}
</style>
</head>

/* ====================== TRẠNG THÁI ====================== */
const KEY = 'gcgd_v1';
let S = load();

function defaultState(){
  return {
    gv: [], gd: [], hd: [],
    dmGioChuan: JSON.parse(JSON.stringify(SEED_DINH_MUC)),
    dmHeSo: JSON.parse(JSON.stringify(SEED_HE_SO)),
    dmHD: JSON.parse(JSON.stringify(SEED_HOAT_DONG)),
    namHoc: '2025-2026',
    nextId: 1000
  };
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    const d = defaultState();
    for(const k of Object.keys(d)) if(s[k]===undefined) s[k]=d[k];
    return s;
  }catch(e){ return defaultState(); }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function uid(){ return ++S.nextId; }

/* ====================== LOGIC TÍNH TOÁN (giữ nguyên từ bản C#) ====================== */
function layHeSoSiSo(siSo){
  const m = S.dmHeSo
    .filter(x => siSo >= x.tu && (x.den === null || x.den === '' || siSo <= x.den))
    .sort((a,b) => a.tu - b.tu)[0];
  return m ? Number(m.heSo) : 1.0;
}
function tinhGiangDay(r){
  r.heSoSiSo = layHeSoSiSo(Number(r.siSo)||0);
  r.gioLT = round2((Number(r.tietLT)||0) * r.heSoSiSo);
  r.gioTH = round2(Number(r.tietTH)||0);
  r.tongGio = round2(r.gioLT + r.gioTH);
  return r;
}
function tinhHoatDong(r){
  const dm = S.dmHD.find(x => x.id === Number(r.dmId));
  if(!dm) return null;
  r.gioMacDinh = Number(dm.gio);
  r.heSo = (Number(r.heSo) || 0) <= 0 ? Number(dm.heSoMacDinh) : Number(r.heSo);
  if(!dm.canTyLe) r.tyLe = 100;
  r.gioDuocTinh = round2((Number(r.soLuong)||0) * r.gioMacDinh * r.heSo * (Number(r.tyLe)||0) / 100);
  return r;
}
function tongHop(gvId, nam){
  const gv = S.gv.find(x => x.id === gvId);
  if(!gv) return null;
  const dinhMuc = S.dmGioChuan.find(x =>
    x.chucDanh === gv.chucDanh && x.trinhDo === gv.trinhDo && x.nam === nam);

  const sumHD = nhom => round2(S.hd
    .filter(x => x.gvId === gvId && x.namHoc === nam &&
      (S.dmHD.find(d => d.id === x.dmId) || {}).nhom === nhom)
    .reduce((a,x) => a + Number(x.gioDuocTinh), 0));

  const gioTrucTiep = round2(S.gd
    .filter(x => x.gvId === gvId && x.namHoc === nam)
    .reduce((a,x) => a + Number(x.tongGio), 0));

  let gioChuanGD = dinhMuc ? Number(dinhMuc.gioGD) : 0;
  let gioChuanNCKH = dinhMuc ? Number(dinhMuc.gioNCKH) : 0;
  let ghiChu = '';
  if(gv.tapSu || gv.ncs){
    gioChuanGD = round2(gioChuanGD * 0.5);
    gioChuanNCKH = 0;
    if(gv.tapSu && gv.ncs) ghiChu = 'Giảng viên tập sự và đang học nghiên cứu sinh: giảm 50% giờ chuẩn giảng dạy, miễn giờ NCKH.';
    else if(gv.tapSu) ghiChu = 'Giảng viên tập sự: giảm 50% giờ chuẩn giảng dạy, miễn giờ NCKH.';
    else ghiChu = 'Giảng viên đang học nghiên cứu sinh: giảm 50% giờ chuẩn giảng dạy, miễn giờ NCKH.';
  }
  if(!dinhMuc) ghiChu = 'Chưa cấu hình định mức giờ chuẩn cho chức danh/trình độ của giảng viên trong năm học này.';

  const t = {
    gv, nam, daCauHinh: !!dinhMuc, ghiChu,
    gioChuanGD, gioChuanNCKH,
    gioTrucTiep,
    gioGiangDayKhac: sumHD('GIANG_DAY_KHAC'),
    gioHoiDong: sumHD('HOI_DONG'),
    gioNCKH: sumHD('NCKH'),
    gioNhiemVuKhac: sumHD('NHIEM_VU_KHAC')
  };
  t.tongGioGiangDay = round2(t.gioTrucTiep + t.gioGiangDayKhac + t.gioHoiDong);
  t.chenhLechGD = round2(t.tongGioGiangDay - t.gioChuanGD);
  t.chenhLechNCKH = round2(t.gioNCKH - t.gioChuanNCKH);
  t.tongTatCa = round2(t.tongGioGiangDay + t.gioNCKH + t.gioNhiemVuKhac);
  return t;
}
function round2(n){ return Math.round((Number(n)||0) * 100) / 100; }
function fmt(n){ return Number(n).toLocaleString('vi-VN', {maximumFractionDigits:2}); }

function previewHD(){
  const dm = S.dmHD.find(d => d.id === Number($('#h_dm').value));

  let hs = Number($('#h_hs').value)||0; if(hs<=0) hs = dm.heSoMacDinh;
  const tl = Number($('#h_tl').value)||0;
  const gio = round2(sl * dm.gio * hs * tl / 100);
  $('#hdPreview').innerHTML = `${esc(dm.ghiChu)} (đơn vị: ${esc(dm.donVi)})<br>
    ${fmt(sl)} × ${fmt(dm.gio)} × ${fmt(hs)} × ${fmt(tl)}% = <b>${fmt(gio)} giờ chuẩn</b>

    <div class="grid3">
      <div><label>Sĩ số từ</label><input id="s_tu" type="number" min="0" value="${h.tu}"></div>
      <div><label>Đến (trống = không giới hạn)</label><input id="s_den" type="number" min="0" value="${h.den===null?'':h.den}"></div>
      <div><label>Hệ số</label><input id="s_hs" type="number" step="0.05" min="0" value="${h.heSo}"></div>
    </div>
  </div>
  <div class="dlg-foot">
    <button type="button" class="btn secondary" onclick="closeDlg()">Hủy</button>
    <button class="btn">Lưu</button>
  </div></form>`);
}
function saveHeSo(id){
  S.dmHeSo = S.dmHeSo.map(x => x.id===id ? {
    id, tu: Number($('#s_tu').value)||0,
    den: $('#s_den').value==='' ? null : Number($('#s_den').value),
    heSo: Number($('#s_hs').value)||1
  } : x);
  S.gd.forEach(tinhGiangDay); // tính lại toàn bộ
  save(); closeDlg(); render();
}
function viewDmHD(){
  const rows = S.dmHD.map(d=>`<tr>
    <td><span class="badge blue">${esc(NHOM[d.nhom])}</span><br>${esc(d.ten)}<div class="muted">${esc(d.ghiChu)} · ${esc(d.donVi)}</div></td>
    <td class="num">${fmt(d.gio)}</td>
    <td class="actions"><button onclick="formDmHD(${d.id})">✏️</button></td>
  </tr>`).join('');
  openDlg(`<div class="dlg-head"><b>Danh mục hoạt động quy đổi (${S.dmHD.length})</b>
    <button class="btn small right" onclick="formDmHD()">+ Thêm</button></div>
  <div class="dlg-body"><div class="tablewrap"><table><tr><th>Hoạt động</th><th class="num">Giờ QĐ</th><th></th></tr>${rows}</table></div></div>
  <div class="dlg-foot"><button class="btn secondary" onclick="closeDlg()">Đóng</button></div>`);
}
function formDmHD(id){
  const d = id ? S.dmHD.find(x=>x.id===id)
    : {nhom:'GIANG_DAY_KHAC', ma:'TU_THEM_'+Date.now(), ten:'', donVi:'', gio:0, heSoMacDinh:1, canTyLe:false, ghiChu:''};
  openDlg(`<form method="dialog" onsubmit="saveDmHD(${id||0});return false">
  <div class="dlg-head"><b>${id?'Sửa':'Thêm'} hoạt động trong danh mục</b></div>
  <div class="dlg-body">
    <label>Nhóm</label><select id="m_nhom">${Object.entries(NHOM).map(([k,v])=>`<option value="${k}" ${k===d.nhom?'selected':''}>${v}</option>`).join('')}</select>
    <label>Tên hoạt động</label><input id="m_ten" required value="${esc(d.ten)}">
    <div class="grid3">
      <div><label>Đơn vị tính</label><input id="m_dv" value="${esc(d.donVi)}"></div>
      <div><label>Giờ quy đổi</label><input id="m_gio" type="number" step="0.1" min="0" value="${d.gio}"></div>
      <div><label>Hệ số mặc định</label><input id="m_hs" type="number" step="0.1" min="0" value="${d.heSoMacDinh}"></div>
    </div>
    <label class="check"><input type="checkbox" id="m_tl" ${d.canTyLe?'checked':''}> Cần chia tỷ lệ đóng góp (đồng tác giả/đồng chủ trì)</label>
    <label>Ghi chú</label><input id="m_gc" value="${esc(d.ghiChu)}">
  </div>
  <div class="dlg-foot">
    <button type="button" class="btn secondary" onclick="closeDlg()">Hủy</button>
    <button class="btn">Lưu</button>
  </div></form>`);
}
function saveDmHD(id){
  const d = {
    id: id || uid(), nhom: $('#m_nhom').value,
    ma: id ? S.dmHD.find(x=>x.id===id).ma : 'TU_THEM_'+Date.now(),
    ten: $('#m_ten').value.trim(), donVi: $('#m_dv').value.trim(),
    gio: Number($('#m_gio').value)||0, heSoMacDinh: Number($('#m_hs').value)||1,
    canTyLe: $('#m_tl').checked, ghiChu: $('#m_gc').value.trim()
  };
  if(!d.ten){ alert('Nhập tên hoạt động.'); return; }
  if(id) S.dmHD = S.dmHD.map(x => x.id===id ? d : x); else S.dmHD.push(d);
  S.hd.forEach(tinhHoatDong); // tính lại
  save(); closeDlg(); render();
}

/* ====================== XUẤT / NHẬP DỮ LIỆU ====================== */
function download(name, content, type){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}
function exportJSON(){
  download(`giochuan-saoluu-${new Date().toISOString().slice(0,10)}.json`,
    JSON.stringify(S, null, 1), 'application/json');
}
function importJSON(input){
  const f = input.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try{
      const s = JSON.parse(rd.result);
      if(!s.dmHD || !Array.isArray(s.gv)) throw 0;
      if(confirm('Phục hồi sẽ THAY THẾ toàn bộ dữ liệu hiện tại. Tiếp tục?')){
        S = s; save(); renderNamHoc(); render(); alert('Đã phục hồi dữ liệu.');
      }
    }catch(e){ alert('File không hợp lệ.'); }
    input.value = '';
  };
  rd.readAsText(f);
}
function resetAll(){
  if(confirm('Xóa TOÀN BỘ dữ liệu và đưa về mặc định? (Nên sao lưu trước)') && confirm('Chắc chắn xóa?')){
    S = defaultState(); save(); renderNamHoc(); render();
  }
}
function csvCell(v){ v = String(v ?? ''); return /[",;\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function exportCsvTongHop(){
  const t = tongHop(tongHopGvId, S.namHoc); if(!t) return;
  const L = [];
  L.push(['BẢNG TỔNG HỢP GIỜ CHUẨN', t.gv.hoTen, t.gv.ma, 'Năm học', t.nam].map(csvCell).join(','));
  L.push('');
  L.push('I. GIẢNG DẠY TRỰC TIẾP');
  L.push(['Học kỳ','Mã HP','Tên học phần','Lớp','TC','Tiết LT','Tiết TH','Sĩ số','Hệ số','Giờ LT','Giờ TH','Tổng giờ'].join(','));
  S.gd.filter(x=>x.gvId===t.gv.id && x.namHoc===t.nam).forEach(r =>
    L.push([r.hocKy,r.maHP,r.tenHP,r.lopHP,r.soTC,r.tietLT,r.tietTH,r.siSo,r.heSoSiSo,r.gioLT,r.gioTH,r.tongGio].map(csvCell).join(',')));
  L.push('');
  L.push('II. HOẠT ĐỘNG QUY ĐỔI');
  L.push(['Nhóm','Hoạt động','Nội dung','Số lượng','Giờ QĐ','Hệ số','Tỷ lệ %','Giờ được tính'].join(','));
  S.hd.filter(x=>x.gvId===t.gv.id && x.namHoc===t.nam).forEach(r => {
    const dm = S.dmHD.find(d=>d.id===r.dmId)||{};
    L.push([NHOM[dm.nhom]||'',dm.ten||'',r.tenNoiDung,r.soLuong,r.gioMacDinh,r.heSo,r.tyLe,r.gioDuocTinh].map(csvCell).join(','));
  });
  L.push('');
  L.push('III. TỔNG HỢP');
  [['Giảng dạy trực tiếp',t.gioTrucTiep],['Giảng dạy khác/Hướng dẫn',t.gioGiangDayKhac],['Hội đồng',t.gioHoiDong],
   ['Tổng giờ giảng dạy',t.tongGioGiangDay],['Định mức giảng dạy',t.gioChuanGD],['Chênh lệch giảng dạy',t.chenhLechGD],
   ['Giờ NCKH',t.gioNCKH],['Định mức NCKH',t.gioChuanNCKH],['Chênh lệch NCKH',t.chenhLechNCKH],
   ['Nhiệm vụ khác',t.gioNhiemVuKhac],['Tổng tất cả giờ quy đổi',t.tongTatCa]
  ].forEach(r => L.push(r.map(csvCell).join(',')));
  if(t.ghiChu){ L.push(''); L.push(csvCell('Ghi chú: '+t.ghiChu)); }
  download(`tonghop-${t.gv.ma}-${t.nam}.csv`, '﻿'+L.join('\r\n'), 'text/csv;charset=utf-8');
}

/* ====================== RENDER CHÍNH ====================== */
function render(){
  renderNav();
  const views = {tonghop:viewTongHop, giangday:viewGiangDay, hoatdong:viewHoatDong, giangvien:viewGiangVien, caidat:viewCaiDat};
  $('#app').innerHTML = views[tab]();
}
renderNamHoc();
render();

/* ====================== SERVICE WORKER (cài đặt lên điện thoại + offline) ====================== */
if('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ====================== TỰ KIỂM TRA (mở trang với #test) ====================== */
function runTests(){
  const eq = (a,b,msg) => { if(Math.abs(a-b) > 1e-9) throw new Error(msg+`: ${a} ≠ ${b}`); };
  const bk = JSON.stringify(S);
  try{
    S = defaultState();
    eq(layHeSoSiSo(0),1.0,'hs 0'); eq(layHeSoSiSo(40),1.0,'hs 40');
    eq(layHeSoSiSo(41),1.1,'hs 41'); eq(layHeSoSiSo(55),1.2,'hs 55');
    eq(layHeSoSiSo(81),1.5,'hs 81'); eq(layHeSoSiSo(200),1.5,'hs 200');
    const g = tinhGiangDay({tietLT:30, tietTH:15, siSo:55});
    eq(g.gioLT,36,'gioLT'); eq(g.gioTH,15,'gioTH'); eq(g.tongGio,51,'tongGio');
    const dmQ1 = S.dmHD.find(d=>d.ma==='BAI_BAO_SCIMAGO_Q1');
    const h1 = tinhHoatDong({dmId:dmQ1.id, soLuong:1, heSo:0, tyLe:50});
    eq(h1.gioDuocTinh,500,'Q1 50%'); eq(h1.heSo,1,'heSo mặc định');
    const dmCoiThi = S.dmHD.find(d=>d.ma==='COI_THI');
    const h2 = tinhHoatDong({dmId:dmCoiThi.id, soLuong:5, heSo:1, tyLe:30});
    eq(h2.tyLe,100,'không chia tỷ lệ'); eq(h2.gioDuocTinh,5,'coi thi 5 ca');
    S.gv = [{id:1, ma:'GV01', hoTen:'Test', chucDanh:'GV_HANG_III', trinhDo:'THAC_SI', tapSu:true, ncs:false, dangLamViec:true}];
    S.gd = [Object.assign({id:2, gvId:1, namHoc:'2025-2026'}, g)];
    S.hd = [];
    const t = tongHop(1,'2025-2026');
    eq(t.gioChuanGD,150,'định mức tập sự 300×0.5'); eq(t.gioChuanNCKH,0,'miễn NCKH');
    eq(t.tongGioGiangDay,51,'tổng GD'); eq(t.chenhLechGD,-99,'chênh lệch');
    alert('✅ Tất cả kiểm tra logic ĐẠT (12 phép thử).');
  }catch(e){ alert('❌ Lỗi kiểm tra: '+e.message); }
  finally{ S = JSON.parse(bk); render(); }
}
if(location.hash === '#test') setTimeout(runTests, 300);
</script>
